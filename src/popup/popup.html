<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadAloud Settings</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        color: #f5f5f5;
        background: #161616;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 18px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        color: #d8d8d8;
      }
      select,
      input,
      button {
        width: 100%;
        min-height: 34px;
        border: 0;
        border-radius: 8px;
      }
      select,
      button {
        padding: 0 10px;
      }
      select,
      input {
        color: #fff;
        background: #2b2b2b;
      }
      button {
        margin-top: 12px;
        color: #111;
        background: #ffd83d;
        font-weight: 700;
      }
      a {
        display: inline-block;
        margin-top: 12px;
        color: #ffd83d;
      }
      .status {
        margin-top: 10px;
        color: #cfcfcf;
      }
    </style>
  </head>
  <body>
    <h1>ReadAloud</h1>
    <label for="voice">Voice</label>
    <select id="voice">
      <option value="af_heart">Heart</option>
      <option value="af_bella">Bella</option>
      <option value="am_adam">Adam</option>
      <option value="bf_emma">Emma</option>
      <option value="bm_george">George</option>
    </select>
    <label for="speed">Default speed: <span id="speed-value">1x</span></label>
    <input id="speed" type="range" min="0.5" max="3" step="0.25" value="1" />
    <div class="status" id="status">Voices download on first use.</div>
    <button id="reset">Clear local model cache</button>
    <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
